events {}

http {
  upstream ielts_app {
    server app:3000;
  }

  server {
    listen 80;
    server_name _;
    absolute_redirect off;

    proxy_http_version 1.1;
    proxy_set_header Host auth.local;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto http;
    proxy_set_header X-Forwarded-Host auth.local;
    proxy_set_header X-Forwarded-Port 80;
    proxy_set_header X-Ielts-Onion-Audience auth;
    proxy_set_header Connection "";
    proxy_redirect off;

    location = / {
      return 302 /auth/login;
    }

    location = /auth/login { proxy_pass http://ielts_app; }
    location = /auth/login/ { proxy_pass http://ielts_app; }
    location = /auth/business/login { proxy_pass http://ielts_app; }
    location = /auth/business/login/ { proxy_pass http://ielts_app; }
    location = /auth/admin/login { proxy_pass http://ielts_app; }
    location = /auth/admin/login/ { proxy_pass http://ielts_app; }
    location = /auth/login.js { proxy_pass http://ielts_app; }
    location = /auth/login.css { proxy_pass http://ielts_app; }
    location = /auth/complete { proxy_pass http://ielts_app; }
    location = /auth/business/logout { proxy_pass http://ielts_app; }
    location = /auth/admin/logout { proxy_pass http://ielts_app; }

    location ^~ /api/auth/ { proxy_pass http://ielts_app; }

    location ^~ /api/admin/ { return 404; }
    location ^~ /api/practice-records { return 404; }
    location ^~ /api/ { return 404; }
    location ^~ /admin { return 404; }
    location ^~ /practice { return 404; }
    location ^~ /assets/generated/ { return 404; }
    location ^~ /templates { return 404; }
    location ^~ /ListeningPractice { return 404; }
    location ^~ /internal { return 404; }
    location ^~ /debug { return 404; }
    location ^~ /metrics { return 404; }

    location / { return 404; }
  }
}
