services:
  admin-proxy:
    image: nginx:alpine
    container_name: ielts-practice-admin-proxy
    restart: unless-stopped
    profiles:
      - admin-onion
    depends_on:
      app:
        condition: service_healthy
    expose:
      - "80"
    volumes:
      - type: bind
        source: ./admin-proxy/nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
        bind:
          create_host_path: false

  admin-tor:
    image: backend-tor-webtunnel:local
    container_name: ielts-practice-admin-tor
    restart: unless-stopped
    profiles:
      - admin-onion
    entrypoint:
      - /bin/sh
      - /usr/local/bin/admin-tor-entrypoint
    depends_on:
      admin-proxy:
        condition: service_started
    volumes:
      - type: bind
        source: ./tor/admin-torrc
        target: /etc/tor/torrc
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./tor/admin-entrypoint.sh
        target: /usr/local/bin/admin-tor-entrypoint
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./tor/webtunnel.local.txt
        target: /etc/tor/webtunnel.local.txt
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./tor/admin-authorized-clients
        target: /authorized_clients
        read_only: true
        bind:
          create_host_path: false
      - admin_tor_hidden_service:/var/lib/tor/admin_hidden_service
    tmpfs:
      - /run/tor:rw,noexec,nosuid,nodev,size=1m,mode=750

volumes:
  admin_tor_hidden_service:
