services:
  auth-proxy:
    image: nginx:alpine
    container_name: ielts-practice-auth-proxy
    restart: unless-stopped
    profiles:
      - auth-onion
    depends_on:
      app:
        condition: service_healthy
    expose:
      - "80"
    volumes:
      - type: bind
        source: ./auth-proxy/nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
        bind:
          create_host_path: false

  auth-tor:
    image: backend-tor-webtunnel:local
    container_name: ielts-practice-auth-tor
    restart: unless-stopped
    profiles:
      - auth-onion
    entrypoint:
      - /bin/sh
      - /usr/local/bin/auth-tor-entrypoint
    depends_on:
      auth-proxy:
        condition: service_started
    volumes:
      - type: bind
        source: ./tor/auth-torrc
        target: /etc/tor/torrc
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./tor/auth-entrypoint-webtunnel.sh
        target: /usr/local/bin/auth-tor-entrypoint
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./tor/webtunnel.local.txt
        target: /etc/tor/webtunnel.local.txt
        read_only: true
        bind:
          create_host_path: false
      - auth_tor_hidden_service:/var/lib/tor/auth_hidden_service
    tmpfs:
      - /run/tor:rw,noexec,nosuid,nodev,size=1m,mode=750

volumes:
  auth_tor_hidden_service:
