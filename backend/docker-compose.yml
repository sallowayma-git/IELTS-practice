services:
  postgres:
    image: postgres:16-alpine
    container_name: ielts-practice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ielts_practice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in backend/.env to a strong value}
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ielts_practice"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: ielts-practice-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ielts_practice
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in backend/.env to a strong value}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in backend/.env to a long random value}
      PORT: 3000
      HOST: 0.0.0.0
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      TOTP_ENABLED: ${TOTP_ENABLED:-true}
      TOTP_ISSUER: ${TOTP_ISSUER:-IELTS Atlas}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY:-}
      TOTP_VERIFICATION_MAX_AGE_MS: ${TOTP_VERIFICATION_MAX_AGE_MS:-43200000}
      ADMIN_RESET_TOTP: ${ADMIN_RESET_TOTP:-false}
      TRAFFIC_ENABLED: ${TRAFFIC_ENABLED:-true}
      TRAFFIC_SECRET: ${TRAFFIC_SECRET:-}
      AUTH_PUBLIC_URL: ${AUTH_PUBLIC_URL:?Set AUTH_PUBLIC_URL to the public auth origin}
      BUSINESS_PUBLIC_URL: ${BUSINESS_PUBLIC_URL:?Set BUSINESS_PUBLIC_URL to the public business origin}
      ADMIN_PUBLIC_URL: ${ADMIN_PUBLIC_URL:?Set ADMIN_PUBLIC_URL to the public admin origin}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - type: bind
        source: ../ListeningPractice
        target: /app/ListeningPractice
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  tor:
    profiles:
      - legacy-onion
    build:
      context: ./tor
      dockerfile: Dockerfile
    container_name: ielts-practice-tor
    restart: unless-stopped
    environment:
      TOR_BRIDGES_FILE: ${TOR_BRIDGES_FILE:-/etc/tor/bridges.local.txt}
      TOR_BRIDGES_ENCRYPTED_FILE: ${TOR_BRIDGES_ENCRYPTED_FILE:-}
      TOR_BRIDGES_AGE_IDENTITY_FILE: ${TOR_BRIDGES_AGE_IDENTITY_FILE:-}
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - type: bind
        source: ${TOR_BRIDGES_LOCAL_FILE:-./tor/bridges.placeholder.txt}
        target: /etc/tor/bridges.local.txt
        read_only: true
        bind:
          create_host_path: false
      - tor_hidden_service:/var/lib/tor/hidden_service
    tmpfs:
      - /run/tor:rw,noexec,nosuid,nodev,size=1m,mode=750

volumes:
  postgres_data:
  tor_hidden_service:
