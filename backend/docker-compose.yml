services:
  postgres:
    image: postgres:16-alpine
    container_name: ielts-practice-postgres
    environment:
      POSTGRES_DB: ielts_practice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ielts_practice"]
      interval: 3s
      timeout: 3s
      retries: 20
