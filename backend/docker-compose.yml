services:
  postgres:
    image: postgres:16-alpine
    container_name: ielts-practice-postgres
    environment:
      POSTGRES_DB: ielts_practice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in backend/.env to a strong value}
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ielts_practice"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: ielts-practice-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ielts_practice
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in backend/.env to a strong value}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in backend/.env to a long random value}
      PORT: 3000
      HOST: 0.0.0.0
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      TOTP_ENABLED: ${TOTP_ENABLED:-true}
      TOTP_ISSUER: ${TOTP_ISSUER:-IELTS Atlas}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY:-}
      ADMIN_RESET_TOTP: ${ADMIN_RESET_TOTP:-false}
      TRAFFIC_ENABLED: ${TRAFFIC_ENABLED:-true}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - type: bind
        source: ../ListeningPractice
        target: /app/ListeningPractice
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  tor:
    build:
      context: .
      dockerfile: tor/Dockerfile
    container_name: ielts-practice-tor
    environment:
      TOR_BRIDGES: ${TOR_BRIDGES:-}
      TOR_BRIDGES_FILE: ${TOR_BRIDGES_FILE:-/etc/tor/bridges.local.txt}
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - type: bind
        source: ${TOR_BRIDGES_LOCAL_FILE:-./tor/bridges.txt}
        target: /etc/tor/bridges.local.txt
        read_only: true
        bind:
          create_host_path: false
      - tor_hidden_service:/var/lib/tor/hidden_service

volumes:
  tor_hidden_service:
