events {}

http {
  upstream ielts_app {
    server app:3000;
  }

  server {
    absolute_redirect off;
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Connection "";

    location = / {
      return 302 /admin/login;
    }

    location = /admin { proxy_pass http://ielts_app; }
    location = /admin/ { proxy_pass http://ielts_app; }
    location = /admin/account { proxy_pass http://ielts_app; }
    location = /admin/account/ { proxy_pass http://ielts_app; }
    location = /admin/account.js { proxy_pass http://ielts_app; }
    location = /admin/account.css { proxy_pass http://ielts_app; }
    location = /admin/login { proxy_pass http://ielts_app; }
    location = /admin/login.js { proxy_pass http://ielts_app; }
    location = /admin/login.css { proxy_pass http://ielts_app; }
    location = /admin/admin.js { proxy_pass http://ielts_app; }
    location = /admin/admin.css { proxy_pass http://ielts_app; }

    location = /api/auth/csrf { proxy_pass http://ielts_app; }
    location = /api/auth/me { proxy_pass http://ielts_app; }
    location = /api/auth/login { proxy_pass http://ielts_app; }
    location = /api/auth/logout { proxy_pass http://ielts_app; }
    location = /api/auth/totp/status { proxy_pass http://ielts_app; }
    location = /api/auth/totp/setup { proxy_pass http://ielts_app; }
    location = /api/auth/totp/verify-setup { proxy_pass http://ielts_app; }
    location = /api/auth/totp/login { proxy_pass http://ielts_app; }
    location = /api/auth/totp/verify { proxy_pass http://ielts_app; }

    location ^~ /api/admin/ { proxy_pass http://ielts_app; }

    location ^~ /api/ { return 404; }
    location / { return 404; }
  }
}
