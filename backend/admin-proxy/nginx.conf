events {}

http {
  upstream ielts_app {
    server app:3000;
  }

  server {
    absolute_redirect off;
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host admin.local;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto http;
    proxy_set_header X-Forwarded-Host admin.local;
    proxy_set_header X-Forwarded-Port 80;
    proxy_set_header X-Ielts-Onion-Audience admin;
    proxy_set_header Connection "";

    location = / {
      return 302 /auth/admin/start?return_to=/admin;
    }

    location = /admin { proxy_pass http://ielts_app; }
    location = /admin/ { proxy_pass http://ielts_app; }
    location = /admin/account { proxy_pass http://ielts_app; }
    location = /admin/account/ { proxy_pass http://ielts_app; }
    location = /admin/account.js { proxy_pass http://ielts_app; }
    location = /admin/account.css { proxy_pass http://ielts_app; }
    location = /admin/admin.js { proxy_pass http://ielts_app; }
    location = /admin/admin.css { proxy_pass http://ielts_app; }

    location = /api/auth/csrf { proxy_pass http://ielts_app; }
    location = /api/auth/me { proxy_pass http://ielts_app; }
    location = /api/auth/logout { proxy_pass http://ielts_app; }
    location = /auth/admin/start { proxy_pass http://ielts_app; }
    location = /auth/admin/callback { proxy_pass http://ielts_app; }
    location = /auth/business/callback { proxy_pass http://ielts_app; }
    location ^~ /auth/ { return 404; }

    location ^~ /api/admin/ { proxy_pass http://ielts_app; }

    location ^~ /api/ { return 404; }
    location / { return 404; }
  }
}
