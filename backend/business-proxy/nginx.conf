events {}

http {
    upstream ielts_app {
        server app:3000;
    }

    server {
        listen 80;
        server_name _;
        absolute_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Host business.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host business.local;
        proxy_set_header X-Forwarded-Port 80;
        proxy_set_header X-Ielts-Onion-Audience business;
        proxy_set_header Connection "";
        proxy_redirect off;

        location ~ ^/(api/admin|admin|internal|debug|metrics)(/|$) {
            return 404;
        }

        location = /api/auth/csrf { proxy_pass http://ielts_app; }
        location = /api/auth/me { proxy_pass http://ielts_app; }
        location = /api/auth/logout { proxy_pass http://ielts_app; }

        location = /api/auth/login { return 404; }
        location = /api/auth/register { return 404; }
        location ^~ /api/auth/totp/ { return 404; }
        location ^~ /api/auth/account/ { return 404; }

        location = /auth/business/start { proxy_pass http://ielts_app; }
        location = /auth/business/callback { proxy_pass http://ielts_app; }
        location = /auth/business/account { proxy_pass http://ielts_app; }
        location = /auth/admin/callback { proxy_pass http://ielts_app; }
        location ^~ /auth/ { return 404; }

        location / {
            proxy_pass http://ielts_app;
        }
    }
}
