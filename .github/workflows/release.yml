name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-shell:
    name: Build shell (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate update contracts
        run: npm run check:update-syntax

      - name: Run update runtime smoke
        run: npm run verify:update-runtime

      - name: Run release client smoke
        run: npm run verify:release-client-smoke

      - name: Run shell release smoke
        run: npm run verify:shell-release-smoke

      - name: Run shell support smoke
        run: npm run verify:shell-support-smoke

      - name: Check macOS notarization prerequisites
        id: mac-prereq
        if: runner.os == 'macOS'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=()
          for key in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ ${#missing[@]} -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "macOS 发布将执行签名 + 公证 + staple。" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### macOS 发布失败：签名/公证 secrets 缺失"
              echo ""
              echo "- 缺失 secrets: ${missing[*]}"
              echo "- 已阻止未签名/未公证 macOS 包进入 Release 分发"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Build Electron artifacts
        if: runner.os != 'macOS' || steps.mac-prereq.outputs.ready == 'true'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          REQUIRE_MAC_NOTARIZE: ${{ runner.os == 'macOS' && '1' || '' }}
        run: npm run release:build

      - name: Verify macOS signature/notarization/staple
        if: runner.os == 'macOS' && steps.mac-prereq.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail

          app_path="$(find dist/electron -type d -name '*.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "未找到 .app 产物"
            exit 1
          fi

          dmg_path="$(find dist/electron -type f -name 'ielts-practice-*-macos-*.dmg' | head -n 1)"
          if [ -z "$dmg_path" ]; then
            echo "未找到 dmg 产物"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler staple "$app_path"
          xcrun stapler validate "$app_path"
          xcrun stapler staple "$dmg_path"
          xcrun stapler validate "$dmg_path"
          spctl --assess --type execute --verbose=4 "$app_path"

      - name: Validate shell artifacts
        if: runner.os != 'macOS' || steps.mac-prereq.outputs.ready == 'true'
        env:
          ALLOW_SHELL_RELEASE_VERSION_MISMATCH: ${{ github.ref_name == 'v0.0.1' && 'true' || 'false' }}
        run: npm run verify:shell-release -- --dir dist/electron --platform "${{ runner.os }}" --tag "${{ github.ref_name }}"

      - name: Upload shell artifacts
        if: runner.os != 'macOS' || steps.mac-prereq.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: shell-${{ matrix.os }}
          path: dist/electron/*
          if-no-files-found: error

  build-resource-packages:
    name: Build resource packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: npm ci

      - name: Validate resource release scripts
        run: npm run check:update-syntax

      - name: Run update runtime smoke
        run: npm run verify:update-runtime

      - name: Run release client smoke
        run: npm run verify:release-client-smoke

      - name: Resolve previous stable tag
        id: previous-tag
        run: |
          PREVIOUS_TAG="$(git tag --list 'v*' --sort=-version:refname | awk -v current="${{ github.ref_name }}" '$0 != current { print; exit }')"
          echo "value=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build resource manifest and packages
        run: |
          if [ -n "${{ steps.previous-tag.outputs.value }}" ]; then
            npm run build:resource-release -- --tag "${{ github.ref_name }}" --previous-tag "${{ steps.previous-tag.outputs.value }}" --output "dist/resources"
          else
            npm run build:resource-release -- --tag "${{ github.ref_name }}" --output "dist/resources"
          fi

      - name: Validate resource manifest contract
        run: npm run verify:resource-release -- --dir dist/resources

      - name: Run resource release smoke
        run: npm run verify:resource-release-smoke -- --dir dist/resources

      - name: Upload resource artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resource-packages
          path: dist/resources/*
          if-no-files-found: error

  publish-release-assets:
    name: Publish verified release assets
    needs:
      - build-shell
      - build-resource-packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: npm ci

      - name: Download Windows shell artifacts
        uses: actions/download-artifact@v4
        with:
          name: shell-windows-latest
          path: dist/release-shell/windows

      - name: Download macOS shell artifacts
        uses: actions/download-artifact@v4
        with:
          name: shell-macos-latest
          path: dist/release-shell/macos

      - name: Detect macOS release assets
        id: mac-assets
        shell: bash
        run: |
          set -euo pipefail
          if ls dist/release-shell/macos/latest-mac.yml >/dev/null 2>&1 \
            && ls dist/release-shell/macos/ielts-practice-*-macos-*.dmg >/dev/null 2>&1 \
            && ls dist/release-shell/macos/ielts-practice-*-macos-*.zip >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            printf "macOS assets are signed, notarized, and stapled.\n" > dist/release-shell/macos-notarization-status.txt
          else
            echo "缺少 macOS Release 资产（latest-mac.yml / dmg / zip），终止发布。"
            exit 1
          fi

      - name: Download resource artifacts
        uses: actions/download-artifact@v4
        with:
          name: resource-packages
          path: dist/release-resources

      - name: Re-verify downloaded Windows shell artifacts
        env:
          ALLOW_SHELL_RELEASE_VERSION_MISMATCH: ${{ github.ref_name == 'v0.0.1' && 'true' || 'false' }}
        run: npm run verify:shell-release -- --dir dist/release-shell/windows --platform Windows --tag "${{ github.ref_name }}"

      - name: Re-verify downloaded macOS shell artifacts
        env:
          ALLOW_SHELL_RELEASE_VERSION_MISMATCH: ${{ github.ref_name == 'v0.0.1' && 'true' || 'false' }}
        run: npm run verify:shell-release -- --dir dist/release-shell/macos --platform macOS --tag "${{ github.ref_name }}"

      - name: Re-verify downloaded resource artifacts
        run: npm run verify:resource-release -- --dir dist/release-resources

      - name: Re-run resource release smoke
        run: npm run verify:resource-release-smoke -- --dir dist/release-resources

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
          gh release create "${{ github.ref_name }}" --verify-tag --title "${{ github.ref_name }}" --generate-notes --draft

      - name: Upload Windows/resource assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist/release-shell/windows/latest.yml \
            dist/release-shell/windows/ielts-practice-*-windows-*-setup.exe \
            dist/release-shell/windows/ielts-practice-*-windows-*-setup.exe.blockmap \
            dist/release-resources/resources-manifest.json \
            dist/release-resources/resources-delta.zip \
            dist/release-resources/resources-full.zip \
            --clobber

      - name: Upload notarized macOS assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist/release-shell/macos-notarization-status.txt \
            dist/release-shell/macos/latest-mac.yml \
            dist/release-shell/macos/ielts-practice-*-macos-*.dmg \
            dist/release-shell/macos/ielts-practice-*-macos-*.zip \
            dist/release-shell/macos/ielts-practice-*-macos-*.zip.blockmap \
            --clobber

      - name: Publish completed GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$(gh release view "${{ github.ref_name }}" --json isDraft -q '.isDraft')" = "true" ]; then
            gh release edit "${{ github.ref_name }}" --draft=false
          fi
