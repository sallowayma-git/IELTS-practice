      - paragraph [ref=e23]: You should spend about 20 minutes on Questions 1-13, which are based on Reading Passage 1 on the following pages.
      - heading "A Brief History of Tea" [level=3] [ref=e24]
      - generic [ref=e25]:
        - generic [ref=e26]:
          - generic [ref=e27]: "Paragraph A (Q1):"
          - generic [ref=e28]: 拖到这里
        - paragraph [ref=e29]:
          - strong [ref=e30]: A
          - text: The story of tea began in ancient China over 5,000 years ago. According to legend, the Emperor Shen Nung was a skilled ruler, creative scientist and patron of the arts. His far-sighted edicts required, among other things, that all drinking water be boiled as a hygienic precaution. One summer day, while visiting a distant region of his realm, he and the court stopped to rest. In accordance with his ruling, the servants began to boil water for the court to drink. Dried leaves from a nearby bush fell into the boiling water, and as the leaves infused the water turned brown. As a scientist, the Emperor was intrigued by the new liquid, drank some, and found it very refreshing. And so, according to legend, tea was created.
      - generic [ref=e31]:
        - generic [ref=e32]:
          - generic [ref=e33]: "Paragraph B (Q2):"
          - generic [ref=e34]: 拖到这里
        - paragraph [ref=e35]:
          - strong [ref=e36]: B
          - text: Tea consumption spread throughout Chinese culture, reaching into every aspect of society. The first definitive book was written on tea a book clearly reflecting Zen Buddhist philosophy – 1,200 years ago. The first tea seeds were brought to Japan by a returning Buddhist priest, who had seen the value of tea in enhancing meditation in China. As a result, he is known as the “Father of Tea” in Japan. Because of this early association, tea in Japan has always been linked with Zen Buddhism. Tea received the Japanese Emperor's support almost instantly and spread rapidly from the royal court and monasteries to other sections of society.
      - generic [ref=e37]:
        - generic [ref=e38]:
          - generic [ref=e39]: "Paragraph C (Q3):"
          - generic [ref=e40]: 拖到这里
        - paragraph [ref=e41]:
          - strong [ref=e42]: C
          - text: Tea was elevated to an art form in the Japanese tea ceremony, in which supreme importance is given to making tea in the most perfect, most polite, most graceful, most charming manner possible. Such a purity of expression prompted the creation of a particular form of architecture for tea houses, duplicating the simplicity of a forest cottage. The cultural/artistic hostesses of Japan, the geishas, began to specialise in the presentation of the tea ceremony. However, as more and more people became involved in the excitement surrounding tea, the purity of the original concept was lost, and for a period the tea ceremony became corrupted, boisterous and highly embellished. Efforts were then made to return to the earlier simplicity, with the result that, in the 15th and 16th centuries, tea was viewed as the ultimate gift. Even warlords paused for tea before battles.
      - generic [ref=e43]:
        - generic [ref=e44]:
          - generic [ref=e45]: "Paragraph D (Q4):"
          - generic [ref=e46]: 拖到这里
        - paragraph [ref=e47]:
          - strong [ref=e48]: D
          - text: While tea was at this high level of development in parts of Asia, information concerning the then-unknown beverage began to filter back to Europe. Earlier traders had mentioned it, but were unclear as to whether tea should be eaten or drunk. The first European to personally encounter tea and write about it was Portuguese – Portugal, with her technologically advanced navy, had been successful in gaining the first right of trade with China.
      - generic [ref=e49]:
        - generic [ref=e50]:
          - generic [ref=e51]: "Paragraph E (Q5):"
          - generic [ref=e52]: 拖到这里
        - paragraph [ref=e53]:
          - strong [ref=e54]: E
          - text: Tea finally arrived in Europe in the 16th century, brought to Holland by the country's navy, and became very fashionable in the Dutch capital, The Hague. This was due in part to tea being very expensive (over $100 per pound), which immediately made it the domain of the wealthy. Slowly, as the amount of tea imported increased, the price fell, and by 1675 it was available in common food shops throughout Holland.
      - generic [ref=e55]:
        - generic [ref=e56]:
          - generic [ref=e57]: "Paragraph F (Q6):"
          - generic [ref=e58]: 拖到这里
        - paragraph [ref=e59]:
          - strong [ref=e60]: F
          - text: As the consumption of tea increased dramatically in Dutch society, doctors and university authorities in Holland argued as to its benefits or drawbacks. The public largely ignored the scholarly debate and continued to enjoy their new beverage, though the controversy lasted from 1635 to roughly 1657. Throughout this period, France and Holland led Europe in the use of tea.
      - generic [ref=e61]:
        - generic [ref=e62]:
          - generic [ref=e63]: "Paragraph G (Q7):"
          - generic [ref=e64]: 拖到这里
        - paragraph [ref=e65]:
          - strong [ref=e66]: G
          - text: As the craze for all things oriental swept through Europe, tea became part of everyday life. Adding milk to the drink was first mentioned in 1680. Around that time, Dutch inns provided the first restaurant service of tea. Innkeepers would furnish guests with a portable tea set complete with a heating unit. The Dutchman would then prepare tea for himself and his friends outside in the inn garden. Tea remained popular in France for only about fifty years, being replaced by a preference for wine, chocolate and exotic coffees. Tea was introduced into England in 1660 by King Charles II and his Portuguese queen, who were both confirmed tea drinkers. Tea mania swept across England as it had earlier spread throughout France and Holland. By 1708, tea importation had risen to thirteen times the 1699 level. Tea was drunk by all levels of society.
      - generic [ref=e67]:
        - generic [ref=e68]:
          - generic [ref=e69]: "Paragraph H (Q8):"
          - generic [ref=e70]: 拖到这里
        - paragraph [ref=e71]:
          - strong [ref=e72]: H
          - text: Russian interest in tea began as early as 1618, when the Chinese embassy in Moscow presented several chests of tea to the Emperor, Czar Alexis. Later in the century, a trade treaty between Russia and China allowed caravans to cross back and forth freely between the two countries. Still, the journey was not easy. The average caravan consisted of 200 to 300 camels, and the 18,000-kilometre trip took over 16 months to complete. Eventually, however, tea became – as it still is – one of the most popular drinks in the country.
